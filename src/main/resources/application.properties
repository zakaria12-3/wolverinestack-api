spring.application.name=demo
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.hikari.data-source-properties.sslmode=require
spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=always
security.jwt.secret-key=${JWT_SECRET_KEY}
security.jwt.expiration-time=604800000
server.port=${PORT:8027}
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
app.base-url=${APP_BASE_URL}
app.upload-dir=${UPLOAD_DIR:uploads/cv}
cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:4200,http://127.0.0.1:4200,https://*.onrender.com,https://*.vercel.app}
GROQ_API_KEY=${GROQ_API_KEY}
BREVO_API_KEY=${BREVO_API_KEY:}
SUPPORT_EMAIL=${SUPPORT_EMAIL:}
spring.config.import=optional:file:.env[.properties]
